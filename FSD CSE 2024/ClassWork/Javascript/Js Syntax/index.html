<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Syntax</title>
</head>
<body>
    <h1 id="head" >Hello World</h1>
    <button onclick="greet('Sreejib')">Click Me</button> <!-- Calling greet() from index.html which resides in app.js -->
    <button onclick="alert('Hello World')">Alert</button>
    <button onclick="textChange()">Change text</button>
    <input type="text" id="input" placeholder="type your message...">
    <button onclick="showName()">Click to see name as alert</button>
     <!-- External Js -->
    <script src="app.js"></script>
</body>
</html>
